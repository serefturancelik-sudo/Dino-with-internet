
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dino: Ay Operasyonu</title>
    <style>
        body { margin: 0; background: #303028; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #f7f7f7; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Oyun Değişkenleri
        let state = 0; // STATE_MENU = 0
        let dino = { x: 100, y: 350, vy: 0, jumping: false, width: 44, height: 44 };
        let frame = 0;
        let score = 0;

        // Çizim yardımcıları
        function drawRect(color, x, y, w, h) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        // Basitleştirilmiş Dino Çizimi (Pygame mantığıyla)
        function drawDino() {
            let x = dino.x, y = dino.y;
            drawRect("#535353", x + 20, y, 24, 16);
            drawRect("#535353", x + 16, y + 12, 16, 12);
            drawRect("#535353", x + 4, y + 20, 32, 16);
            drawRect("#535353", x, y + 24, 8, 8);
        }

        // Oyun Döngüsü
        function update() {
            if (state === 1) { // STATE_CLASSIC
                if (dino.jumping) {
                    dino.vy += 0.8;
                    dino.y += dino.vy;
                    if (dino.y >= 350) {
                        dino.y = 350;
                        dino.jumping = false;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (state === 0) { // MENU
                ctx.fillStyle = "#535353";
                ctx.font = "40px Courier New";
                ctx.fillText("DINO: MARS'IN KRALI", canvas.width/2 - 200, 100);
                ctx.font = "20px Courier New";
                ctx.fillText("[ BAŞLAMAK İÇİN TIKLA ]", canvas.width/2 - 120, 400);
                drawDino();
            } else if (state === 1) { // CLASSIC
                drawDino();
                ctx.beginPath();
                ctx.moveTo(0, 395); ctx.lineTo(canvas.width, 395);
                ctx.stroke();
            }
            
            requestAnimationFrame(() => { update(); draw(); });
        }

        // Etkileşimler
        window.addEventListener('mousedown', () => {
            if (state === 0) {
                state = 1;
            } else if (state === 1 && !dino.jumping) {
                dino.vy = -15;
                dino.jumping = true;
            }
        });

        draw();
    </script>
</body>
</html>
