<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çıpıl Debug Level XL</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f4d15e;
            --gold-dim: #8a6d1f;
            --black: #060606;
            --black-2: #171717;
            --red: #cc4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--black);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ana Ekran Konteyneri */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background-color: var(--black);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
        }

        /* Üst Logo Grubu */
        .brand-header {
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .brand-text {
            text-align: right;
        }

        .brand-title {
            color: var(--gold-bright);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            color: var(--gold-dim);
            font-size: 10px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background-color: var(--gold-bright);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--black);
            font-weight: bold;
            font-size: 18px;
            border: 2px solid var(--black);
            box-shadow: 0 0 0 1.4px var(--gold-bright);
        }

        /* Pro Rozeti */
        .pro-badge {
            width: 140px;
            height: 38px;
            background-color: var(--gold-bright);
            border-radius: 19px;
            color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            transition: transform 0.2s;
        }

        .pro-badge:active {
            transform: scale(0.95);
        }

        /* Fener Butonu alanı */
        .torch-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .torch-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: var(--black-2);
            border: 2px solid var(--gold-dim);
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .torch-btn.active {
            background-color: var(--gold-bright);
            border-color: var(--gold-bright);
            box-shadow: 0 0 40px rgba(244, 209, 94, 0.4);
        }

        /* Fener İkon Çizimleri */
        .torch-icon {
            width: 46px;
            height: 70px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .torch-head {
            width: 46px;
            height: 24px;
            background-color: var(--gold-dim);
            border-radius: 6px;
            position: relative;
        }

        .torch-body {
            width: 30px;
            height: 46px;
            background-color: var(--gold-dim);
            border-radius: 4px;
            margin-top: -2px;
        }

        .torch-lens {
            width: 22px;
            height: 10px;
            background-color: var(--black-2);
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 12px;
        }

        .torch-btn.active .torch-head,
        .torch-btn.active .torch-body {
            background-color: var(--black);
        }

        .torch-btn.active .torch-lens {
            background-color: var(--gold-dim);
        }

        /* Işık Hüzmeleri (Sadece aktifken görünür) */
        .beams {
            position: absolute;
            top: -45px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .torch-btn.active .beams {
            display: flex;
        }

        .beam {
            background-color: var(--black);
            height: 3px;
            border-radius: 2px;
        }
        .beam-1 { width: 14px; }
        .beam-2 { width: 22px; }
        .beam-3 { width: 30px; }

        /* Alt Durum Bilgileri */
        .status-area {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .status-label {
            font-size: 13px;
            color: var(--gold-dim);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .trial-label {
            font-size: 11px;
            color: var(--gold-dim);
        }

        /* Modal Ortak Yapısı */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 24px;
        }

        .modal-content {
            background-color: var(--black);
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
        }

        /* Ödeme Duvarı (Paywall) Tasarımı */
        .pw-title {
            color: var(--gold-bright);
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        .pw-subtitle {
            color: var(--gold-dim);
            font-size: 11px;
            text-align: center;
            margin-top: -8px;
        }

        .plans-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .plan-card {
            background-color: var(--black-2);
            border: 1px solid var(--gold-dim);
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 58px;
            transition: all 0.2s;
        }

        .plan-card.selected {
            background-color: #1a1506;
            border: 1.4px solid var(--gold-bright);
        }

        .plan-title {
            color: var(--gold-bright);
            font-size: 14px;
            font-weight: bold;
        }

        .plan-price {
            color: var(--gold-dim);
            font-size: 11px;
            margin-top: 2px;
        }

        .action-btn {
            background-color: var(--gold-bright);
            color: var(--black);
            border: none;
            border-radius: 12px;
            height: 48px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Reklam Pop-up Tasarımı */
        .ad-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border: 1.4px solid var(--gold-dim);
            border-radius: 50%;
            color: var(--gold-dim);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
        }

        .ad-body {
            text-align: center;
            padding: 20px 0;
        }

        .ad-title {
            color: var(--gold-bright);
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .ad-countdown {
            color: var(--gold-bright);
            font-size: 44px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .ad-sub {
            color: var(--gold-dim);
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Logo -->
        <div class="brand-header">
            <div class="brand-text">
                <div class="brand-title">CIPIL DEBUG</div>
                <div class="brand-subtitle">LEVEL XL</div>
            </div>
            <div class="brand-logo">C</div>
        </div>

        <!-- Rozet -->
        <div id="proBadge" class="pro-badge">PRO'YA GEÇ</div>

        <!-- Fener Butonu -->
        <div class="torch-wrapper">
            <div id="torchBtn" class="torch-btn">
                <div class="beams">
                    <div class="beam beam-3"></div>
                    <div class="beam beam-2"></div>
                    <div class="beam beam-1"></div>
                </div>
                <div class="torch-icon">
                    <div class="torch-head">
                        <div class="torch-lens"></div>
                    </div>
                    <div class="torch-body"></div>
                </div>
            </div>
        </div>

        <!-- Alt Bilgiler -->
        <div class="status-area">
            <div id="statusLabel" class="status-label">KAPALI</div>
            <div id="trialLabel" class="trial-label">Bugün kalan deneme hakkı: 10/10</div>
        </div>
    </div>

    <!-- Ödeme Duvarı Modalı -->
    <div id="paywallModal" class="modal">
        <div class="modal-content">
            <div class="pw-title">CIPIL DEBUG LEVEL XL PRO</div>
            <div class="pw-subtitle">Günlük 10 deneme hakkın bitti</div>
            
            <div class="plans-list">
                <div class="plan-card" data-plan="daily">
                    <div class="plan-title">Günlük</div>
                    <div class="plan-price">Ücretsiz - reklam izle</div>
                </div>
                <div class="plan-card" data-plan="monthly">
                    <div class="plan-title">Aylık</div>
                    <div class="plan-price">0,01 TL / ay</div>
                </div>
                <div class="plan-card selected" data-plan="yearly">
                    <div class="plan-title">Yıllık</div>
                    <div class="plan-price">0,99 TL / yıl - en avantajlı</div>
                </div>
            </div>

            <button id="buyBtn" class="action-btn">SATIN AL</button>
        </div>
    </div>

    <!-- Reklam Modalı -->
    <div id="adModal" class="modal">
        <div class="modal-content">
            <div id="adClose" class="ad-close-btn">X</div>
            <div class="ad-body">
                <div class="ad-title">REKLAM OYNUYOR</div>
                <div id="adCountdown" class="ad-countdown">5</div>
                <div class="ad-sub">Ödülünü almak için bekle</div>
            </div>
        </div>
    </div>

    <script>
        // Durum Yönetimi (LocalStorage entegrasyonlu UsageStore)
        const DAILY_LIMIT = 10;
        const AD_SECONDS = 5;
        
        let store = {
            date: "",
            count: 0,
            pro: false,
            free_until: ""
        };

        // Kivy kodundaki set_torch_state mantığı (Web El Feneri API'si)
        let mediaStreamTrack = null;

        function loadStore() {
            const data = localStorage.getItem("cipil_fener_usage");
            if (data) {
                try { store = JSON.parse(data); } catch(e) {}
            }
            checkDayReset();
        }

        function saveStore() {
            localStorage.setItem("cipil_fener_usage", JSON.stringify(store));
            updateUI();
        }

        function checkDayReset() {
            const today = new Date().toISOString().split('T')[0];
            if (store.date !== today) {
                store.date = today;
                store.count = 0;
                localStorage.setItem("cipil_fener_usage", JSON.stringify(store));
            }
        }

        function isPro() { return !!store.pro; }
        function hasFreeDay() {
            if (!store.free_until) return false;
            return new Date() < new Date(store.free_until);
        }
        function remaining() {
            checkDayReset();
            return Math.max(0, DAILY_LIMIT - store.count);
        }
        function canUse() {
            return isPro() || hasFreeDay() || remaining() > 0;
        }

        // DOM Elementleri
        const torchBtn = document.getElementById("torchBtn");
        const statusLabel = document.getElementById("statusLabel");
        const trialLabel = document.getElementById("trialLabel");
        const proBadge = document.getElementById("proBadge");
        const paywallModal = document.getElementById("paywallModal");
        const adModal = document.getElementById("adModal");
        const buyBtn = document.getElementById("buyBtn");
        const adCountdown = document.getElementById("adCountdown");
        const adClose = document.getElementById("adClose");
        const planCards = document.querySelectorAll(".plan-card");

        let selectedPlan = "yearly";
        let adInterval = null;

        function updateUI() {
            checkDayReset();
            
            // Rozet Güncelleme
            if (isPro()) {
                proBadge.textContent = "PRO AKTİF";
                trialLabel.textContent = "PRO üyelik aktif - sınırsız kullanım";
            } else if (hasFreeDay()) {
                proBadge.textContent = "ÜCRETSİZ GÜN";
                trialLabel.textContent = "Ücretsiz gün aktif - sınırsız kullanım";
            } else {
                proBadge.textContent = "PRO'YA GEÇ";
                trialLabel.textContent = `Bugün kalan deneme hakkı: ${remaining()}/${DAILY_LIMIT}`;
            }
        }

        // Gerçek kamera fenerini kontrol etme fonksiyonu
        async function setTorchState(state) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
            
            if (state) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }
                    });
                    mediaStreamTrack = stream.getVideoTracks()[0];
                    const capabilities = mediaStreamTrack.getCapabilities();
                    
                    if (capabilities.torch) {
                        await mediaStreamTrack.applyConstraints({ advanced: [{ torch: true }] });
                        return true;
                    } else {
                        // Cihazda donanımsal fener yoksa bile arayüzün çalışması için simüle et
                        return true; 
                    }
                } catch (e) {
                    console.log("Fener izni alınamadı veya donanım yok.");
                    return false;
                }
            } else {
                if (mediaStreamTrack) {
                    try {
                        await mediaStreamTrack.applyConstraints({ advanced: [{ torch: false }] });
                        mediaStreamTrack.stop();
                    } catch(e){}
                    mediaStreamTrack = null;
                }
                return true;
            }
        }

        async function toggleTorch() {
            const isCurrentlyOn = torchBtn.classList.contains("active");
            const nextState = !isCurrentlyOn;

            if (nextState && !canUse()) {
                statusLabel.textContent = "DENEME HAKKI BİTTİ";
                statusLabel.style.color = "var(--red)";
                openPaywall();
                return;
            }

            const ok = await setTorchState(nextState);

            if (ok) {
                if (nextState) {
                    torchBtn.classList.add("active");
                    statusLabel.textContent = "AÇIK";
                    statusLabel.style.color = "var(--gold-bright)";
                    if (!isPro() && !hasFreeDay()) {
                        store.count++;
                        saveStore();
                    }
                } else {
                    torchBtn.classList.remove("active");
                    statusLabel.textContent = "KAPALI";
                    statusLabel.style.color = "var(--gold-dim)";
                }
                updateUI();
            } else {
                statusLabel.textContent = "İZİN GEREKLİ / HATA";
                statusLabel.style.color = "var(--red)";
            }
        }

        function openPaywall() {
            paywallModal.style.display = "flex";
        }

        function startAd() {
            paywallModal.style.display = "none";
            adModal.style.display = "flex";
            let timeLeft = AD_SECONDS;
            adCountdown.textContent = timeLeft;

            adInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(adInterval);
                    adCountdown.textContent = "0";
                    // Ödülü Ver
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    store.free_until = tomorrow.toISOString();
                    saveStore();
                    adModal.style.display = "none";
                } else {
                    adCountdown.textContent = timeLeft;
                }
            }, 1000);
        }

        // Event Listeners
        torchBtn.addEventListener("click", toggleTorch);
        proBadge.addEventListener("click", () => {
            if (!isPro()) openPaywall();
        });

        planCards.forEach(card => {
            card.addEventListener("click", () => {
                planCards.forEach(c => c.classList.remove("selected"));
                card.classList.add("selected");
                selectedPlan = card.getAttribute("data-plan");
                buyBtn.textContent = selectedPlan === "daily" ? "REKLAMI İZLE" : "SATIN AL";
            });
        });

        buyBtn.addEventListener("click", () => {
            if (selectedPlan === "daily") {
                startAd();
            } else {
                store.pro = true;
                saveStore();
                paywallModal.style.display = "none";
            }
        });

        adClose.addEventListener("click", () => {
            clearInterval(adInterval);
            adModal.style.display = "none";
        });

        // Dışarı tıklayınca paywall kapatma
        window.addEventListener("click", (e) => {
            if (e.target === paywallModal) {
                paywallModal.style.display = "none";
            }
        });

        // Başlangıç hamlesi
        loadStore();
    </script>
</body>
</html>
