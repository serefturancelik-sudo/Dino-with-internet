<!DOCTYPE html>
<html>
<head>
    <title>Dino: Ay Operasyonu</title>
    <style>
        body { margin: 0; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #fff; background: #f7f7f7; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth * 0.8;
        canvas.height = 600;

        // Oyun Değişkenleri
        let dino = { x: 50, y: 400, w: 40, h: 40, vy: 0, jumping: false };
        let gameActive = true;

        function drawDino() {
            ctx.fillStyle = "#535353";
            ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
        }

        function update() {
            // Basit yerçekimi simülasyonu
            if (dino.jumping) {
                dino.vy += 0.8;
                dino.y += dino.vy;
                if (dino.y >= 400) {
                    dino.y = 400;
                    dino.jumping = false;
                    dino.vy = 0;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Zemin
            ctx.beginPath();
            ctx.moveTo(0, 440);
            ctx.lineTo(canvas.width, 440);
            ctx.stroke();
            
            drawDino();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            update();
            draw();
        }

        window.addEventListener('mousedown', () => {
            if (!dino.jumping) {
                dino.vy = -15;
                dino.jumping = true;
            }
        });

        gameLoop();
    </script>
</body>
</html>
